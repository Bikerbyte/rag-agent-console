# 只起基礎設施（Postgres + Grafana otel-lgtm），給「app 在 host 上 dotnet run、
# 容器跑在 Ubuntu VM」的開發模式用。
#
# 在 VM 裡執行：
#   docker compose -f docker-compose.deps.yml up -d
#
# host 上的 app 連線（把 <vm-ip> 換成 VM 的 IP；WSL2 可直接用 localhost）：
#   ConnectionStrings__DefaultConnection=Host=<vm-ip>;Port=5432;Database=rag_agent;Username=postgres;Password=change-me
#   Observability__EnableOpenTelemetry=true
#   Observability__OtlpEndpoint=http://<vm-ip>:4317
#   Grafana UI：http://<vm-ip>:3000

services:
  db:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    container_name: rag-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_agent}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: rag-agent-lgtm
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
      - "${OTLP_GRPC_PORT:-4317}:4317"
    restart: unless-stopped

volumes:
  postgres_data:
