apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-agent-console

resources:
  - ../../base/app

images:
  - name: rag-agent-console
    newTag: local

patches:
  - target:
      kind: Ingress
      name: rag-agent-web
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: traefik
