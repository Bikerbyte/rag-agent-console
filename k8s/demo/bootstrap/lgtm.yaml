# Grafana + Tempo + Prometheus + Loki 一體包，收 app 的 OTLP trace/metric。
# Grafana UI 沒開 Ingress，demo 時用 port-forward：
#   kubectl -n rag-agent-console port-forward svc/lgtm 3000:3000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
          ports:
            - containerPort: 3000
            - containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
spec:
  selector:
    app: lgtm
  ports:
    - name: grafana
      port: 3000
    - name: otlp-grpc
      port: 4317
