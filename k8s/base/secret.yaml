# 機密設定的「形狀」。實際部署請用 kubectl create secret / sealed-secrets /
# external-secrets 取代這份檔案，不要把真值 commit 進 Git。
apiVersion: v1
kind: Secret
metadata:
  name: rag-agent-secrets
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=rag_agent;Username=postgres;Password=change-me"
  TelegramBot__BotToken: ""
  TelegramBot__WebhookSecretToken: ""
  AiProvider__OpenAiApiKey: ""
