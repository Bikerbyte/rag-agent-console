apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-agent-console

# 完整資源集合只供 render / review。實際發布請依序套用
# bootstrap -> migrate -> app，避免 web/worker 早於 migration 啟動。
resources:
  - bootstrap
  - migrate
  - app

# 換成自己的 registry / tag，例如 ghcr.io/<user>/rag-agent-console:v1。
images:
  - name: rag-agent-console
    newTag: local
