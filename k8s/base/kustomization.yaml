apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-agent-console

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - migration-job.yaml
  - web-deployment.yaml
  - web-service.yaml
  - worker-deployment.yaml
  - ingress.yaml

# 換成自己的 registry / tag，例如 ghcr.io/<user>/rag-agent-console:v1。
images:
  - name: rag-agent-console
    newTag: local
