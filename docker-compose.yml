services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=${POSTGRES_HOST:-host.docker.internal};Port=${POSTGRES_PORT:-5433};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      TelegramBot__Enabled: ${TELEGRAM_BOT_ENABLED:-false}
      TelegramBot__BotToken: ${TELEGRAM_BOT_TOKEN:-}
      TelegramBot__ApiBaseUrl: https://api.telegram.org
      TelegramBot__PollingDelaySeconds: 3
      TelegramBot__UseWebhookMode: ${TELEGRAM_BOT_USE_WEBHOOK_MODE:-false}
      TelegramBot__WebhookPath: ${TELEGRAM_BOT_WEBHOOK_PATH:-/api/telegram/webhook}
      TelegramBot__WebhookUrl: ${TELEGRAM_BOT_WEBHOOK_URL:-}
      TelegramBot__WebhookSecretToken: ${TELEGRAM_BOT_WEBHOOK_SECRET_TOKEN:-}
      AppRuntime__InstanceName: ${APP_RUNTIME_INSTANCE_NAME:-}
      AppRuntime__EnableTelegramWebhookIngress: ${APP_RUNTIME_ENABLE_TELEGRAM_WEBHOOK_INGRESS:-}
      AppRuntime__EnableTelegramPollingWorker: ${APP_RUNTIME_ENABLE_TELEGRAM_POLLING_WORKER:-}
      AppRuntime__EnableTelegramUpdateQueueWorker: ${APP_RUNTIME_ENABLE_TELEGRAM_UPDATE_QUEUE_WORKER:-}
      AppRuntime__EnableOfficialDataSyncWorker: ${APP_RUNTIME_ENABLE_OFFICIAL_DATA_SYNC_WORKER:-}
      AppRuntime__EnableNotificationWorker: ${APP_RUNTIME_ENABLE_NOTIFICATION_WORKER:-}
      PushNotifications__EnableSecurityAdvisoryPush: ${ENABLE_SECURITY_ADVISORY_PUSH:-true}
      SecurityAdvisories__EnableCisaKevSource: ${SECURITY_ADVISORIES_ENABLE_CISA_KEV_SOURCE:-true}
      SecurityAdvisories__EnableNvdSource: ${SECURITY_ADVISORIES_ENABLE_NVD_SOURCE:-true}
      SecurityAdvisories__NvdLookbackDays: ${SECURITY_ADVISORIES_NVD_LOOKBACK_DAYS:-7}
      SecurityAdvisories__MaxNvdResultsPerSync: ${SECURITY_ADVISORIES_MAX_NVD_RESULTS_PER_SYNC:-100}
      AiProvider__Provider: ${AI_PROVIDER:-Local}
      AiProvider__EnableChatGeneration: ${AI_ENABLE_CHAT_GENERATION:-false}
      AiProvider__UseLocalFallback: ${AI_USE_LOCAL_FALLBACK:-true}
      AiProvider__OpenAiApiBaseUrl: ${OPENAI_API_BASE_URL:-https://api.openai.com}
      AiProvider__OpenAiApiKey: ${OPENAI_API_KEY:-}
      AiProvider__OpenAiChatModel: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      AiProvider__OpenAiEmbeddingModel: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      AiProvider__OllamaApiBaseUrl: ${OLLAMA_API_BASE_URL:-http://host.docker.internal:11434}
      AiProvider__OllamaChatModel: ${OLLAMA_CHAT_MODEL:-llama3.1}
      AiProvider__OllamaEmbeddingModel: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      VectorStore__CandidateLimit: ${VECTOR_STORE_CANDIDATE_LIMIT:-3000}
      Observability__EnableOpenTelemetry: ${ENABLE_OPEN_TELEMETRY:-true}
      Observability__EnableConsoleExporter: ${ENABLE_OPEN_TELEMETRY_CONSOLE_EXPORTER:-false}
      Observability__OtlpEndpoint: ${OTEL_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      Observability__ServiceName: ${OPEN_TELEMETRY_SERVICE_NAME:-RagAgentConsole}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_data:/app/App_Data
    restart: unless-stopped

volumes:
  app_data:
