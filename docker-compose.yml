services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpbl-telegram-assistant
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      TelegramBot__Enabled: ${TELEGRAM_BOT_ENABLED:-false}
      TelegramBot__BotToken: ${TELEGRAM_BOT_TOKEN:-}
      TelegramBot__ApiBaseUrl: https://api.telegram.org
      TelegramBot__PollingDelaySeconds: 3
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_data:/app/App_Data
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: cpbl-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app_data:
  postgres_data:
